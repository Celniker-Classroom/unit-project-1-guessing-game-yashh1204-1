<!DOCTYPE html>
<html>
  <head>
    <title>JavaScript Number Guessing Game</title>
    <style>
      /* --- Overall Page Styling (from sketch) --- */
      body {
        /* Background is a gray to silver gradient */
        background: linear-gradient(135deg, #a0a0a0, #c0c0c0, #e0e0e0);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        color: white; /* Contrast text */
      }

      /* --- Common Rule: Rounded corners on everything --- */
      button, input[type="text"], .level-selector label, #date, .game-card, .results-box, .stats-card {
        border-radius: 12px;
      }

      /* --- The Main Container (inside/box background) --- */
      .game-card {
        /* background for inside/box should be gray to a lighter black gradient */
        background: linear-gradient(180deg, #505050, #202020);
        width: 400px;
        padding: 20px;
        box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.4);
        position: relative;
        text-align: center;
      }

      /* Date Display (from requirements) */
      #date {
        font-size: 14px;
        background-color: rgba(255, 255, 255, 0.1);
        padding: 8px;
        margin-bottom: 20px;
        display: inline-block;
      }

      /* Section Titles */
      h3 {
        margin-top: 0;
        font-size: 18px;
        font-weight: normal;
        margin-bottom: 10px;
      }

      /* --- Difficulty Selection (three boxes) --- */
      .difficulty-section {
        margin-bottom: 20px;
      }

      .difficulty-options {
        display: flex;
        justify-content: space-around;
        gap: 10px;
      }

      /* These boxes are styled and rounded to act like custom inputs */
      .level-selector {
        flex: 1;
        position: relative;
      }

      /* container boxes should be same color as page background (gray-to-silver) */
      .level-selector label {
        display: block;
        background: linear-gradient(135deg, #a0a0a0, #c0c0c0, #e0e0e0);
        color: #333;
        padding: 15px 10px;
        cursor: pointer;
        font-weight: bold;
        transition: transform 0.2s, box-shadow 0.2s;
        border: 2px solid transparent;
      }

      /* Visually handle when radio is checked */
      .level-selector input[type="radio"]:checked + label {
        border-color: #fff;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        transform: scale(1.03);
      }

      /* Common Button Styles (Rounded, standard color) */
      .primary-btn {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 12px 24px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        width: 100%;
        margin-bottom: 10px;
        transition: opacity 0.2s;
      }
      
      .primary-btn:hover {
        opacity: 0.9;
      }
      
      .primary-btn:disabled {
        background-color: #707070;
        cursor: not-allowed;
        opacity: 0.7;
      }

      /* Feedback message area (from requirements) */
      #msg {
        background-color: rgba(0, 0, 0, 0.5);
        padding: 10px;
        margin: 15px 0;
        font-weight: bold;
        min-height: 24px;
      }

      /* --- The Guess Input/Submit Area --- */
      .guess-controls {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      #guess {
        flex: 2;
        padding: 12px;
        font-size: 16px;
        border: 1px solid #707070;
        background-color: #f0f0f0;
        color: #333;
        text-align: center;
      }

      #guessBtn {
        flex: 1;
        margin-bottom: 0;
      }

      /* --- Stats & Leaderboard (from sketch) --- */
      .bottom-section {
        display: flex;
        justify-content: space-between;
        gap: 15px;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .results-box, .stats-card {
        flex: 1;
        background-color: rgba(255, 255, 255, 0.05);
        padding: 10px;
        text-align: left;
      }
      
      .results-box h3, .stats-card h3 {
        font-size: 16px;
        margin-bottom: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 4px;
      }

      .results-box p {
        margin: 4px 0;
        font-size: 13px;
      }
      
      .results-box ol {
        margin: 4px 0 0 20px;
        padding: 0;
        font-size: 13px;
      }
      
      .stats-card p {
        margin: 4px 0;
        font-size: 13px;
      }

      /* --- Give Up (positioned like sketch) --- */
      #giveUpBtn {
        background-color: #dc3545;
        position: absolute;
        bottom: -45px; /* offset below the card like the drawing */
        right: 0px;
        width: 120px;
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <div class="game-card">
      <p id="date"></p>

      <div class="difficulty-section">
        <h3>Level</h3>
        <div class="difficulty-options">
          <div class="level-selector">
            <input type="radio" name="level" id="e" value="3" checked>
            <label for="e">Easy (1-3)</label>
          </div>
          <div class="level-selector">
            <input type="radio" name="level" id="m" value="10">
            <label for="m">Medium (1-10)</label>
          </div>
          <div class="level-selector">
            <input type="radio" name="level" id="h" value="100">
            <label for="h">Hard (1-100)</label>
          </div>
        </div>
      </div>

      <button id="playBtn" class="primary-btn">Play</button>

      <p id="msg">Select a Level to Start!</p>

      <div class="guess-controls">
        <input type="text" id="guess" placeholder="0">
        <button id="guessBtn" class="primary-btn" disabled>Guess</button>
      </div>

      <div class="bottom-section">
        <div class="results-box">
          <h3>Leaderboard</h3>
          <p id="wins">Wins: 0</p>
          <ol>
            <li name="leaderboard">100</li>
            <li name="leaderboard">100</li>
            <li name="leaderboard">100</li>
          </ol>
        </div>
        
        <div class="stats-card">
          <h3>Statistics</h3>
          <p id="avgScore">Avg Score: --</p>
          <p id="fastest">Fastest: --s</p>
          <p id="avgTime">Avg Time: --s</p>
        </div>
      </div>

      <button id="giveUpBtn" class="primary-btn" disabled>Give Up</button>
    </div>
  </body>
</html>
